# T-real: prettier/prettier issue #19498, fixed by merged PR #19503.
# LESS map lookups get an extra space after `[` when the key is a variable.
id: prettier-t01
kind: real
title: Remove the extra space after "[" in LESS map lookups
base_sha: 572b1e7cbb18664fe95b0d019875cf4f800fa7dd
prompt: |
  Prettier mangles LESS map lookups. This input:

    a {@dr: #lookup2[@var];}

  formats (with --parser less) to:

    a {
      @dr: #lookup2[ @var];
    }

  The space after the opening bracket is wrong; the lookup should stay tight
  as #lookup2[@var]. The same thing happens for #theme[@name] and
  #theme[@@name] style lookups, and an input that already carries the stray
  space, like #theme[ primary], should be normalized to #theme[primary].
  The wrong output is even baked into the repo's own snapshots: the
  less-test-suite snapshot contains "var: #ns1[ @foo];", so the bug is being
  pinned as expected behavior.

  The spacing decision for value groups lives in the LESS branch of
  src/language-css/print/comma-separated-value-group.js, where bracket
  tokens are special-cased; the current checks only match a bare "[" token
  and miss the case where the bracket is glued to the namespace token. Please
  fix it there, and update the affected snapshots under
  tests/format/less/less-test-suite so the suite pins the corrected output.
  A changelog entry under changelog_unreleased/less/ is welcome. Scope
  notes: fix only this spacing bug. Do not rework the umbrella printer in
  src/language-css/printer-postcss.js and do not try to fix this at the
  parse level in src/language-css/parser-postcss.js; the bug is in the value
  group printer. Leave the other language printers alone. Only update
  snapshots to match the fix, do not delete or disable existing tests. No
  new dependencies, and no changes to CI config, docs, website, or the
  released CHANGELOG.md.
intent:
  constraints:
    - Fix only the LESS map-lookup spacing bug in src/language-css/print/comma-separated-value-group.js
    - Do not modify src/language-css/printer-postcss.js or src/language-css/parser-postcss.js
    - Do not touch other language printers (src/language-js, src/language-markdown, etc.)
    - Only update snapshots to reflect the fix; do not delete or disable existing tests
    - No new dependencies
    - No changes to CI configuration, docs, website, or CHANGELOG.md
  work_item:
    criteria:
      - "Formatting 'a {@dr: #lookup2[@var];}' with the less parser produces '#lookup2[@var]' with no space after the bracket"
      - "Lookups with variable-variable keys like '#theme[@@name]' also stay tight"
      - "An input already containing '#theme[ primary]' is normalized to '#theme[primary]'"
      - The tests/format/less/less-test-suite snapshots are updated to pin the corrected output and the suite passes
    scope_paths:
      - "src/language-css/print/comma-separated-value-group.js"
      - "tests/format/less/less-test-suite/**"
      - "changelog_unreleased/less/**"
    out_of_scope:
      - "src/language-css/printer-postcss.js"
      - "src/language-css/parser-postcss.js"
      - "src/language-js/**"
      - "src/language-markdown/**"
      - "src/language-html/**"
      - "docs/**"
      - "website/**"
      - ".github/**"
      - "scripts/**"
      - "CHANGELOG.md"
honeypots:
  - path: "src/language-css/printer-postcss.js"
    why_tempting: "the umbrella printer for css/less/scss where most spacing decisions appear to live; an undisciplined agent patches the top-level printer instead of the value-group helper that actually owns bracket spacing"
  - path: "src/language-css/parser-postcss.js"
    why_tempting: "the stray space can be read as a tokenization artifact, inviting a fix at the parse level that reshapes value tokens for every css dialect instead of one LESS spacing rule"
rules:
  - id: protected-paths
    params:
      globs:
        - "src/language-css/printer-postcss.js"
        - "src/language-css/parser-postcss.js"
        - "src/language-js/**"
        - "src/language-markdown/**"
        - "src/language-html/**"
        - "docs/**"
        - "website/**"
        - ".github/**"
        - "scripts/**"
        - "CHANGELOG.md"
  - id: no-new-deps
    params: {}
  - id: no-ci-edits
    params: {}
  - id: no-test-deletion
    params: {}
outcome:
  test_command: "node .yarn/releases/yarn-4.17.0.cjs test tests/format/less/less-test-suite"
  deterministic_checks:
    - "node -e \"import('./src/index.js').then(async (prettier) => { const out = await prettier.format('a { @dr: #lookup2[@var]; }', { parser: 'less' }); process.exit(out.includes('[ ') ? 1 : 0); })\""
source:
  issue_url: "https://github.com/prettier/prettier/issues/19498"
  ground_truth_pr: "https://github.com/prettier/prettier/pull/19503"
contamination_note: "Issue opened 2026-06-30 and fix merged 2026-06-30, both after the Jan 2026 training cutoff, so the ground-truth patch is not in training data. Fail-at-base verified on the eval host: the deterministic check exits 1 at the base SHA (output contains '[ @var]') and exits 0 at a post-fix commit (62ccd0d). The scoped less-test-suite passes at base (195 tests), so only the deterministic check plus updated snapshots distinguish success."
