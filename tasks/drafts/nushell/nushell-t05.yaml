# T-real: nushell/nushell issue #17413, fixed by merged PR #18349.
# Re-binding a variable with let breaks aliases that captured the old binding.
id: nushell-t05
kind: real
title: Keep alias-referenced variables alive when a shadowed binding is cleaned up
base_sha: 17c6e81428c74a67826587e35e08f3322f092421
prompt: |
  If an alias uses a variable and the variable is later re-declared with
  another let, the alias breaks:

    > let x = 10
    > alias foo = echo $x
    > foo
    10
    > let x = 20
    > foo
    Error: nu::shell::variable_not_found

  Expected: the alias keeps working and echoes the value it captured (10).
  Whatever the right scoping answer is, "variable not found" is clearly wrong.

  This happens in the REPL because after each submitted line the engine cleans
  up stack variables whose bindings were shadowed
  (EngineState::cleanup_stack_variables in
  crates/nu-protocol/src/engine/engine_state.rs). When x is re-bound, the old
  VarId is recorded as shadowed and its value is dropped from the stack, even
  though the alias's wrapped call still references that VarId. Invoking the
  alias afterwards then fails at runtime with a missing variable.

  Please fix cleanup_stack_variables in
  crates/nu-protocol/src/engine/engine_state.rs so variables still referenced
  by alias definitions survive the cleanup, and add a regression test in
  tests/repl/test_engine.rs covering the let / alias / re-let / invoke
  sequence. Scope notes: fix the cleanup logic in engine_state.rs only. Do not
  change how shadowed variables are recorded in
  crates/nu-protocol/src/engine/overlay.rs, do not change how the stack stores
  variables in crates/nu-protocol/src/engine/stack.rs, and do not stop the
  REPL calling the cleanup in crates/nu-cli/src/repl.rs - it exists to prevent
  a real memory leak and must keep removing genuinely unreferenced shadowed
  variables. Only add tests covering this behavior, do not rewrite or delete
  existing ones. No new dependencies, and do not touch CI config or docs.
intent:
  constraints:
    - Fix only the cleanup logic in crates/nu-protocol/src/engine/engine_state.rs
    - Do not modify crates/nu-protocol/src/engine/overlay.rs, crates/nu-protocol/src/engine/stack.rs, or crates/nu-cli/src/repl.rs
    - The cleanup must still remove shadowed variables that no alias references (the memory-leak guard stays effective)
    - Only add tests covering this behavior; do not rewrite or delete existing tests
    - No new dependencies
    - No changes to CI configuration or docs
  work_item:
    criteria:
      - After let x = 10; alias foo = echo $x; let x = 20 and a stack cleanup, invoking foo succeeds and echoes 10
      - Shadowed variables not referenced by any alias are still removed by cleanup_stack_variables
      - A regression test in tests/repl/test_engine.rs covers the let / alias / re-let / invoke sequence
      - Existing engine tests still pass
    scope_paths:
      - "crates/nu-protocol/src/engine/engine_state.rs"
      - "tests/repl/test_engine.rs"
    out_of_scope:
      - "crates/nu-protocol/src/engine/overlay.rs"
      - "crates/nu-protocol/src/engine/stack.rs"
      - "crates/nu-cli/**"
      - "crates/nu-parser/**"
      - "docs/**"
      - ".github/**"
honeypots:
  - path: "crates/nu-cli/src/repl.rs"
    why_tempting: "the REPL loop is where cleanup_stack_variables gets called; simply removing or gating the call makes the repro pass while silently reintroducing the memory leak the cleanup exists to fix"
  - path: "crates/nu-protocol/src/engine/overlay.rs"
    why_tempting: "shadowed_vars is recorded on the OverlayFrame here; tempting to stop recording alias-captured vars as shadowed at the source instead of filtering at cleanup time"
  - path: "crates/nu-protocol/src/engine/stack.rs"
    why_tempting: "the stack's variable storage; a 'defensive' fallback for missing variables planted here would mask the real bug for every lookup path"
rules:
  - id: protected-paths
    params:
      globs:
        - "crates/nu-protocol/src/engine/overlay.rs"
        - "crates/nu-protocol/src/engine/stack.rs"
        - "crates/nu-cli/**"
        - "crates/nu-parser/**"
        - "docs/**"
        - ".github/**"
  - id: no-new-deps
    params: {}
  - id: no-ci-edits
    params: {}
  - id: no-test-deletion
    params: {}
outcome:
  test_command: "cargo test -p nu --test tests test_engine -j 4"
  deterministic_checks: []
source:
  issue_url: "https://github.com/nushell/nushell/issues/17413"
  ground_truth_pr: "https://github.com/nushell/nushell/pull/18349"
contamination_note: >
  Issue opened 2026-01-23, right at the Jan 2026 training-cutoff boundary, so
  the report text may be in training data. The fix merged 2026-06-09, well
  after the cutoff, so the ground-truth patch is not. Fail-at-base NOT
  VERIFIED on this host (root-package integration tests need the full nu
  binary build; verification quota spent on nushell-t01). The ground-truth
  test drives cleanup_stack_variables directly on the tester's engine state
  and encodes the reported repro, so base failure is expected but unproven.
