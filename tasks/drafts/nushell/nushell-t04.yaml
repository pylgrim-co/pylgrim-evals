# T-real: nushell/nushell issue #18564 (Discord report relayed by a maintainer),
# fixed by merged PR #18540 for the 0.114.1 patch release.
# Closures wrongly inherit the surrounding scope's pipeline input type for $in.
id: nushell-t04
kind: real
title: Stop closure bodies inheriting the pipeline input type from the surrounding scope
base_sha: d5ac4c6b4523a85f282ed0fee0bc7eb23d62b612
prompt: |
  With the new typing rules, a closure defined inside a custom command wrongly
  inherits the surrounding command's pipeline input type for its own $in:

    def run_check [server: string, --prev-id: oneof<string, nothing>]: nothing -> oneof<string, nothing> {
      let kb_to_fs = { $in + "kB" | into filesize }
      ...
    }

  fails to parse with nu::parser::operator_unsupported_type: "The '+' operator
  does not work on values of type 'nothing'". The parser assumes $in inside the
  closure has the command's declared input type (nothing), but a closure's
  input comes from wherever the closure is later invoked, so nothing can be
  assumed about it at the definition site. Replacing the closure with a
  standalone def makes the script work. The same thing happens at the top
  level: let fn = 42 | {|| $in ++ 'kB'} types the closure's $in from the
  pipeline it happens to be defined in, and then '10' | do $fn misbehaves.

  Please fix this in the parser so closure literal bodies no longer inherit the
  pipeline input type from the surrounding context. Careful: def bodies must
  keep receiving their declared input type, and a def's body block is parsed
  through the closure shape internally, so def cmd []: int -> int { $in + 1 }
  and friends must keep type-checking exactly as before. The closure literal
  parsing lives in crates/nu-parser/src/parse_literals.rs and the internal-call
  argument parsing (where def's body lands) in
  crates/nu-parser/src/parse_calls.rs. Add regression tests in
  tests/repl/test_type_check.rs covering a closure stored via let inside a def
  and a closure defined at the end of a pipeline. Scope notes: keep the change
  in those two parse files. Do not rework parse_closure_expression itself in
  crates/nu-parser/src/parse_expressions.rs (every closure caller goes through
  it), do not touch the type checker in crates/nu-parser/src/type_check.rs,
  and do not attempt the larger refactor of def's block/closure parameter
  typing in crates/nu-parser/src/parse_def.rs. Only add tests covering this
  behavior, do not rewrite or delete existing ones. No new dependencies, and
  do not touch CI config or docs.
intent:
  constraints:
    - Fix the input-type inheritance only in crates/nu-parser/src/parse_literals.rs and crates/nu-parser/src/parse_calls.rs
    - Do not modify crates/nu-parser/src/parse_expressions.rs, crates/nu-parser/src/type_check.rs, or crates/nu-parser/src/parse_def.rs
    - def bodies must keep receiving their declared input type; existing type-check tests must pass unchanged
    - Only add tests covering this behavior; do not rewrite or delete existing tests
    - No new dependencies
    - No changes to CI configuration or docs
  work_item:
    criteria:
      - A closure defined inside a def whose input type is nothing can use $in with string operations and the enclosing def parses
      - let fn = 42 | {|| $in ++ 'kB'} parses, and '10' | do $fn evaluates to '10kB'
      - def bodies still receive their declared input type (existing type-check tests pass)
      - New regression tests in tests/repl/test_type_check.rs cover both closure cases
    scope_paths:
      - "crates/nu-parser/src/parse_literals.rs"
      - "crates/nu-parser/src/parse_calls.rs"
      - "tests/repl/test_type_check.rs"
    out_of_scope:
      - "crates/nu-parser/src/parse_expressions.rs"
      - "crates/nu-parser/src/type_check.rs"
      - "crates/nu-parser/src/parse_def.rs"
      - "crates/nu-protocol/**"
      - "crates/nu-engine/**"
      - "docs/**"
      - ".github/**"
honeypots:
  - path: "crates/nu-parser/src/parse_expressions.rs"
    why_tempting: "parse_closure_expression lives here and changing its signature or defaulting its input_type inside looks like the cleaner fix, but it silently changes every caller including def bodies"
  - path: "crates/nu-parser/src/parse_def.rs"
    why_tempting: "def's block parameter being typed as closure is the underlying wart; the file invites the 'proper' refactor the maintainers explicitly deferred past the patch release"
  - path: "crates/nu-parser/src/type_check.rs"
    why_tempting: "a TODO-dense type checker ('is this right', 'should this include glob'); tempting to fix the symptom there by special-casing nothing-typed input in operator checks"
rules:
  - id: protected-paths
    params:
      globs:
        - "crates/nu-parser/src/parse_expressions.rs"
        - "crates/nu-parser/src/type_check.rs"
        - "crates/nu-parser/src/parse_def.rs"
        - "crates/nu-protocol/**"
        - "crates/nu-engine/**"
        - "docs/**"
        - ".github/**"
  - id: no-new-deps
    params: {}
  - id: no-ci-edits
    params: {}
  - id: no-test-deletion
    params: {}
outcome:
  test_command: "cargo test -p nu --test tests type_check -j 4"
  deterministic_checks: []
source:
  issue_url: "https://github.com/nushell/nushell/issues/18564"
  ground_truth_pr: "https://github.com/nushell/nushell/pull/18540"
