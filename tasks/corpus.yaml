# Corpus definition for the pylgrim evaluation harness.
#
# Schema:
#   repos:                     # pinned public repos the tasks run against
#     - name: str              # short id, used for results/repos/<name>.git
#       url: str               # public clone URL
#       preserve: [str]        # dirs excluded from `git clean -fdx` between runs
#                              # (dependency caches, e.g. node_modules, .venv, target)
#   arms: [str]                # subset of: vanilla, claudemd, pylgrim
#   models: [str]              # claude CLI model aliases (e.g. sonnet, haiku)
#   reps: int                  # replications per (task, arm, model) cell
#   schedule_seed: int         # seed for the blocked-by-rep randomized schedule
#
# Task cards live as separate YAML files in this directory (tasks/<repo>-tNN.yaml);
# see harness/src/harness/taskcards.py for their schema.
#
# Fields beyond name/url/preserve are documentation (the harness reads only those
# three): pinned_sha is the repo-level pin used by T-bait cards (T-real cards pin
# their own PR-parent SHA), host_verified flips true once the test suite has run
# green on the eval host. Selection rationale and provenance: CORPUS-CANDIDATES.md.
# Ratified by Sam 2026-07-05 ("proceed as recommended"): 10 pins, strata 3/4/3,
# 6/10 TS/JS, pilot pair = zustand + click.

repos:
  # ---- small ----
  - name: zustand
    url: https://github.com/pmndrs/zustand
    preserve: [node_modules]
    pinned_sha: a1f685ca744e56a982b1c5029620e0925c3ee996
    language: TypeScript
    license: MIT
    stratum: small
    install: "pnpm install"
    test: "pnpm test:spec"
    host_verified: true
    pilot: true
  - name: sql-formatter
    url: https://github.com/sql-formatter-org/sql-formatter
    preserve: [node_modules]
    pinned_sha: b2ce5459c1861eac394a20ac69c7f222a5cebd95
    language: TypeScript
    license: MIT
    stratum: small
    install: "pnpm install"
    test: "pnpm test"
    host_verified: true
    host_notes: >
      Verified 2026-07-10: install exit 0 (~420s: the prepare script runs the
      full check+build pipeline), test exit 0 (~43s, 5822 passed / 2 skipped).
  - name: click
    url: https://github.com/pallets/click
    preserve: [.venv]
    pinned_sha: 16fc00e2f4a2717a521084f193709a6058afc693
    language: Python
    license: BSD-3-Clause
    stratum: small
    install: "uv sync"
    test: "uv run pytest -q"
    host_verified: true
    pilot: true
  # ---- medium ----
  - name: hono
    url: https://github.com/honojs/hono
    preserve: [node_modules]
    pinned_sha: d6b1d32a697ef9ba9f5036753fe9bde1121c0ff9
    language: TypeScript
    license: MIT
    stratum: medium
    install: "bun install"
    test: "bun run vitest --run --project main"
    host_verified: true
    host_notes: >
      Verified 2026-07-10. AMENDED test command: the original
      "--project node" ran only the Node-adapter smoke file (14 tests);
      "--project main" runs the library suite (121 files, 3614 tests, ~5
      min). Known flaky under host load: compress streaming multi-chunk
      test can hit its 5s timeout; passes in isolation.
  - name: zod
    url: https://github.com/colinhacks/zod
    preserve: [node_modules]
    pinned_sha: 912f0f51b0ced654d0069741e7160834dca742ee
    language: TypeScript
    license: MIT
    stratum: medium
    install: "pnpm install"
    test: "pnpm vitest run --project zod"
    host_verified: true
    host_notes: >
      Verified 2026-07-10. AMENDED test command: the original
      "pnpm --filter zod vitest run" was a FALSE GREEN (pnpm prints "None of
      the selected packages has a vitest script" and exits 0 running zero
      tests). The amended command runs 336 files / 3808 tests (~44s) from
      the repo root.
  - name: prettier
    url: https://github.com/prettier/prettier
    preserve: [node_modules, .yarn]
    pinned_sha: cf7db3500a89faeb24ad0af45c6b9a0e7b074a03
    language: JavaScript
    license: MIT
    stratum: medium
    install: "node .yarn/releases/yarn-4.17.0.cjs install"
    test: "node .yarn/releases/yarn-4.17.0.cjs test --testPathIgnorePatterns=patterns-dirs"
    host_verified: true
    host_notes: >
      Verified 2026-07-10. AMENDED commands: no global yarn/corepack on this
      host (Node 25 dropped corepack); the repo vendors yarn 4.17.0, invoked
      via node. Full suite 30630 passed / 12520 snapshots green in ~8 min.
      tests/integration/__tests__/patterns-dirs.js is excluded: it needs
      fs.symlinkSync, which requires Windows Developer Mode (off on this
      host) — host-specific, not genuine. The suite also fails en masse
      under a sandboxed shell (spawn UNKNOWN in fork-heavy integration
      tests); it must run unsandboxed.
  - name: rich
    url: https://github.com/Textualize/rich
    preserve: [.venv]
    pinned_sha: 9d8f9a372cc5916fd4781fec207ced7ddac2f08f
    language: Python
    license: MIT
    stratum: medium
    install: "uv venv && uv pip install -e . pytest attrs"
    test: "uv run pytest -q"
    host_verified: true
    host_notes: >
      Verified 2026-07-10. AMENDED install: attrs added (tests/test_pretty.py
      imports attr; rich's dev deps live in a Poetry group that
      "uv pip install -e ." ignores — command gap, not host-specific).
      With attrs: 984 passed / 23 skipped in ~12s.
  # ---- large ----
  - name: eslint
    url: https://github.com/eslint/eslint
    preserve: [node_modules]
    pinned_sha: 8fb550e7c257fbdc4108fc8e63db43c1d914d472
    language: JavaScript
    license: MIT
    stratum: large
    install: "npm install --ignore-scripts"
    test: "npx mocha tests/lib/rules/<scoped>.js"
    host_verified: true
    host_notes: >
      Verified 2026-07-10. AMENDED install: plain npm install fails on this
      host (transitive re2 native build: no node-v25 prebuilt, VS BuildTools
      lacks a Windows SDK); --ignore-scripts skips it, and re2 is
      docs-tooling only (metascraper), unused by rule tests. Scoped rule
      suites verified green: no-unused-vars 448, indent 1090, no-undef 103,
      zero failures. Card test commands substitute the <scoped> template.
  - name: nushell
    url: https://github.com/nushell/nushell
    preserve: [target]
    pinned_sha: 57a036c4b011c027609b90afefb52f5930d84496
    language: Rust
    license: MIT
    stratum: large
    install: "cargo build -j 4"
    test: "cargo test --workspace -j 4 --no-fail-fast"
    host_verified: true
    host_notes: >
      Verified 2026-07-10. AMENDED: -j 4 is mandatory on this 16 GB host
      (default parallelism dies: os error 1455 paging-file / rustc
      0xc0000409). Full-workspace result: 98 targets green; 59 failures
      across 5 targets, none genuine — 51 need SeCreateSymbolicLinkPrivilege
      (Developer Mode off), 6 ps1-execution + 1 job-kill are host-env, 1
      AV-flake passed on re-run. Task cards MUST use scoped test commands
      (cargo test -p <crate> <filter> -j 4) chosen to avoid the
      symlink/ps1-dependent tests; the workspace sweep is corpus evidence,
      not a per-run oracle. Logs: results/host-verify/nushell-test*.log.
  - name: hugo
    url: https://github.com/gohugoio/hugo
    preserve: []
    pinned_sha: 5a5f4a54952261fd3e28fda1a22128990e6bfdc6
    language: Go
    license: Apache-2.0
    stratum: large
    install: "go build ./..."
    test: "go test ./..."
    host_verified: true
    host_notes: >
      Verified 2026-07-10: go test ./... green (143 packages ok, 0 FAIL,
      48 without tests), ~35-40 min wall. Log kept at
      results/host-verify/hugo-test.log.

# Pilot configuration (WI-E04): 2 repos x 4 tasks x 2 arms x 3 reps = 48 runs.
# Wave 1 proper re-plans with the frozen pre-registration seed after the pilot.
arms:
  - vanilla
  - claudemd

models:
  - sonnet

reps: 3

schedule_seed: 42
