             entry_cap_15, evidence_resolves, within_budgets,
             multi_source_evidence, conflict_surfaced, consolidation_safe]
notes: >
  Five agent files (CLAUDE.md, AGENTS.md, GEMINI.md, .cursor/rules/one.mdc,
