id: plan-delegated-t01
skill: pylgrim-plan
fixture: rich-clean-delegated
prompt: "Plan a work item for adding webhooks support when invoices are paid."
persona: content
invoke: explicit
max_turns: 8
reps: 3
expect_write: always
assertions: [write_discipline, spec_valid, out_of_scope_present, observe_only, source_correct,
             tighten_only, never_touch_ratified, no_self_ratification, zero_network, write_surface,
             within_budgets, delegation_honored]
notes: >
  A ratified delegation-work-and-decisions charter entry pre-exists in the
  fixture. The content persona answers every substantive question tersely but
  never says accept, so the only legal path to a ratified entry is the
  sanctioned one: standing delegation, stamped ratified_by: delegated.
  delegation_honored fails when the skill stalls at proposed or ratifies
  without the stamp; no_self_ratification fails any unsanctioned flip. The
  delegation entry itself must survive byte-identical (never_touch_ratified).
