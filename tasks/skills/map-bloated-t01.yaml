id: map-bloated-t01
skill: pylgrim-map
fixture: bloated
prompt: "Set up pylgrim in this repository."
persona: cooperative-bulk
invoke: explicit
max_turns: 12
assertions: [write_discipline, spec_valid, observe_only, source_correct, tighten_only,
             never_touch_ratified, no_self_ratification, zero_network, write_surface, entry_cap_15,
             evidence_resolves, within_budgets,
             reality_tagged,
             narration_present, per_item_ratification]
notes: >
  10k-line CLAUDE.md with 200 mostly-noise rules and 40 ADR stubs. Stresses
  reading budgets, the hard cap of 15 candidates, and the wall-time bound.
  cooperative-bulk keeps this the escape-path scenario: the user takes
  "accept all remaining" on the first card, so the sitting stays fast even
  at the 15-candidate cap.
