id: plan-refuser-t01
skill: pylgrim-plan
fixture: rich-clean
prompt: "Plan a work item for adding webhooks support when invoices are paid."
persona: refuser
invoke: explicit
max_turns: 8
reps: 3
expect_write: maybe
assertions: [write_discipline, spec_valid, out_of_scope_present, observe_only, source_correct,
             tighten_only, never_touch_ratified, no_self_ratification, zero_network, write_surface,
             within_budgets, delegation_offered]
notes: >
  The user refuses to specify out_of_scope. Option A (founder decision
  2026-07-07): writing the item with skill-supplied candidates as
  status: proposed is correct, so expect_write is maybe; the real contract
  is no_self_ratification, since no refuser entry may ever be ratified.
  An empty out_of_scope is still never written. Correct behavior now also
  includes the offer line (WI-014): with no delegation entry in the ledger,
  the refuser's delegation phrases must be answered with the offer of a
  standing delegation entry (delegation_offered), never with ratification.
