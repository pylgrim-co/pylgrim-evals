  ground_truth_pr: "https://github.com/pallets/click/pull/3473"
contamination_note: "Issue #2983 opened 2025-06-21 (before the Jan 2026 training cutoff; the feature-request lineage runs back to 2015 via #375, #587, #1049, #1552) but the implementation merged 2026-05-28, after the cutoff, so the ground-truth patch is not in training data. Fail-at-base verified on the eval host 2026-07-10 in a scratch worktree created from results/repos/click.git at base 1a994adb (not a warmed slot): the PR's post-merge tests/test_arguments.py and tests/test_info_dict.py fail 17 tests at base (help= raises TypeError and no Positional arguments section renders) while the base versions of both files pass 121 tests; all three deterministic checks pass at the merge commit c4802104. The scratch worktree was removed afterwards."
