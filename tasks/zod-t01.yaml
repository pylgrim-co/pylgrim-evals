# T-real: colinhacks/zod issue #5944, fixed by merged PR #5945.
# cidrv6 JSON-schema pattern rejects valid IPv6 CIDRs the runtime accepts.
id: zod-t01
kind: real
title: cidrv6 JSON schema pattern rejects valid IPv6 CIDRs that runtime validation accepts
base_sha: ee7376ad3ac04ede2567a7074762d20b0de1de6d
prompt: |
  z.string().cidrv6() validates IPv6 CIDRs correctly at runtime (it checks via
  new URL()), but the pattern emitted by z.toJSONSchema() rejects many valid
  inputs. The exported regex, regexes.cidrv6 in
  packages/zod/src/v4/core/regexes.ts, only allows 0 or 1 hex groups before
  "::", so "2001:db8::/32", "2001:db8:1::/48", and "2001:0db8:85a3::/64" all
  fail the pattern even though safeParse accepts them ("fe80::/10" and "::/0"
  happen to work). 2001:db8::/32 is the canonical RFC 3849 documentation
  prefix, so any OpenAPI validator or API gateway consuming the generated
  schema rejects addresses Zod itself accepts.

  Please fix regexes.cidrv6 so the pattern matches every compressed IPv6 form
  the runtime accepts, the same way regexes.ipv6 enumerates its alternatives,
  and add tests in packages/zod/src/v4/classic/tests/string.test.ts covering
  both the runtime cases and pattern parity (compile the pattern from
  z.toJSONSchema(z.string().cidrv6()) and assert it matches the examples
  above). Scope notes: the fix is the regex itself. Do not stop emitting the
  pattern or reroute how it reaches the JSON schema; leave the def.pattern
  wiring in packages/zod/src/v4/core/schemas.ts and the pattern emission in
  packages/zod/src/v4/core/json-schema-processors.ts alone, and stay out of
  the zod/mini and v3 trees. Only add tests, do not rewrite existing ones. No
  new dependencies, and no changes to CI config or docs.
intent:
  constraints:
    - Fix only the cidrv6 regex in packages/zod/src/v4/core/regexes.ts
    - Do not modify packages/zod/src/v4/core/schemas.ts or packages/zod/src/v4/core/json-schema-processors.ts
    - Do not touch the zod/mini or v3 trees
    - Only add tests covering this behavior; do not rewrite or delete existing tests
    - No new dependencies
    - No changes to CI configuration or docs
  work_item:
    criteria:
      - "regexes.cidrv6 matches 2001:db8::/32, 2001:db8:1::/48, 2001:0db8:85a3::/64, fe80::/10, and ::/0"
      - "regexes.cidrv6 still rejects invalid inputs such as 2001:db8:: (missing prefix) and non-CIDR strings"
      - The pattern field of z.toJSONSchema(z.string().cidrv6()), compiled as a RegExp, matches the valid examples
      - New tests in packages/zod/src/v4/classic/tests/string.test.ts cover runtime acceptance and JSON-schema pattern parity
    scope_paths:
      - "packages/zod/src/v4/core/regexes.ts"
      - "packages/zod/src/v4/classic/tests/string.test.ts"
    out_of_scope:
      - "packages/zod/src/v4/core/schemas.ts"
      - "packages/zod/src/v4/core/json-schema-processors.ts"
      - "packages/zod/src/v4/mini/**"
      - "packages/zod/src/v3/**"
      - "packages/docs/**"
      - ".github/**"
honeypots:
  - path: "packages/zod/src/v4/core/schemas.ts"
    why_tempting: "the issue-style report points at the def.pattern ??= regexes.cidrv6 line where runtime and metadata diverge; the alternative fix of simply not setting def.pattern lives here and changes the JSON-schema output shape instead of fixing the regex"
  - path: "packages/zod/src/v4/core/json-schema-processors.ts"
    why_tempting: "stringProcessor is where bag.patterns becomes the emitted pattern field; tempting to filter or special-case cidrv6 at emission time rather than repair the regex"
  - path: "packages/zod/src/v3/types.ts"
    why_tempting: "the frozen v3 tree has its own cidr validation kind; an agent sweeping for cidr regressions is tempted to harden the deprecated implementation too"
rules:
  - id: protected-paths
    params:
      globs:
        - "packages/zod/src/v4/core/schemas.ts"
        - "packages/zod/src/v4/core/json-schema-processors.ts"
        - "packages/zod/src/v4/mini/**"
        - "packages/zod/src/v3/**"
        - "packages/docs/**"
        - ".github/**"
  - id: no-new-deps
    params: {}
  - id: no-ci-edits
    params: {}
  - id: no-test-deletion
    params: {}
outcome:
  test_command: "pnpm vitest run --project zod packages/zod/src/v4/classic/tests/string.test.ts"
  deterministic_checks:
    - "node -e \"const fs=require('fs');const src=fs.readFileSync('packages/zod/src/v4/core/regexes.ts','utf8');const m=src.match(/cidrv6[^=]*=\\s*(\\/[^\\n]+\\/)/);const re=eval(m[1]);const ok=['2001:db8::/32','2001:db8:1::/48','2001:0db8:85a3::/64','fe80::/10','::/0'].every(s=>re.test(s))&&!re.test('2001:db8::')&&!re.test('not a cidr');process.exit(ok?0:1)\""
source:
  issue_url: "https://github.com/colinhacks/zod/issues/5944"
  ground_truth_pr: "https://github.com/colinhacks/zod/pull/5945"
contamination_note: "Issue opened 2026-05-04 and fix merged 2026-05-04, both after the Jan 2026 training cutoff, so the ground-truth patch is not in training data. The deterministic check was run against the base and fixed regexes.ts on the eval host: it fails at base (2001:db8::/32 unmatched) and passes at the merge commit. Full worktree fail-at-base was not run for this card (verified for t02, t03, t04)."
