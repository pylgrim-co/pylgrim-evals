  prompt: |-
    `math` subcommands error out ungracefully on values larger than 64-bit integers

    ### Bug report form

    - [x] I have done a basic search of the issue tracker to find any existing issues that are similar.
    - [x] I have checked that my version is at least the latest stable release available via my installation method.

    ### Describe the bug

    I encountered this issue while performing some analytics on the [Retraction Watch Dataset CSV](https://gitlab.com/crossref/retraction-watch-data/-/blob/main/retraction_watch.csv). The errors are inconsistent based on the input datatype and the command used, but seem limited to operations that involve a running computation. Errors change depending upon if the input is a `list<duration>` or a `table<columnname: duration>`.

    Commands that work (both list and table):
    - `math min`
    - `math max`
    - `math median`
    - `math mode`

    Commands that error:
    - `math avg` (`nu::shell::unsupported_input` for table, `nu::shell::operator_overflow` for list)
    - `math stddev` (`nu::shell::unsupported_input` for table, `nu::shell::only_supports_this_input_type` for list)
    - `math product` (`nu::shell::unsupported_input` for table, `nu::shell::only_supports_this_input_type` for list)
    - `math sum` (`nu::shell::unsupported_input` for table, `nu::shell::operator_overflow` for list)
    - `math variance` (`nu::shell::unsupported_input` for table, `nu::shell::only_supports_this_input_type` for list)

    At first I thought this was because of the length of the list I was working from was too large, but chunking down the list revealed that these are all operator overflow errors.

    ### How to reproduce

    1. `let good_and_bad = [[[distance]; [521769600000000000ns], [523843200000000000ns], [526089600000000000ns], [529635600000000000ns], [534816000000000000ns], [537580800000000000ns], [538617600000000000ns], [543974400000000000ns], [544665600000000000ns], [554774400000000000ns], [554947200000000000ns], [565059600000000000ns], [583808400000000000ns], [595209600000000000ns]], [[distance]; [618019200000000000ns], [650422800000000000ns], [652579200000000000ns], [657849600000000000ns], [660873600000000000ns], [662342400000000000ns], [664416000000000000ns], [667782000000000000ns], [669855600000000000ns], [673311600000000000ns], [675903600000000000ns], [677462400000000000ns], [681609600000000000ns], [683766000000000000ns]]]` - this creates two lists, one under the limit and the other over the limit.
    2. `$good_and_bad.0 | select distance | math avg` - works. `$good_and_bad.0 | get distance | math avg` - works.
    3. `$good_and_bad.1 | select distance | math avg` - unsupported input error. `$good_and_bad.1 | get distance | math avg` - operator overflow error.
    4. repeat steps 2 and 3 with different `math` subcommands to validate.

    ### Expected behavior

    In an ideal world, I'd like for `math` subcommands to have access to rust's `i128` primitive, at least under the hood for calculations on large 64 bit ints. This may be an unrealistic request, and is likely a niche situation.

    Instead, I would expect that both table and list of durations properly report back the operator overflow error, and/or provide more helpful error messages indicating the bounds of operations, similar to the error message for `bit-shl`/`bit-shr`:

    ```nu
    ❯ : 1 bit-shl 65
    Error: nu::shell::operator_overflow

      × Operator overflow.
       ╭─[entry #261:1:3]
     1 │ 1 bit-shl 65
       ·   ───┬───
       ·      ╰── right operand to bit-shl exceeds available bits in underlying data
       ╰────
      help: Limit operand to 0 <= rhs < 64
    ```

