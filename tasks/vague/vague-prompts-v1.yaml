    ### Environment

    Node version: v24.15.0
    npm version: v11.12.1
    Local ESLint version: v10.4.1
    Global ESLint version: Not installed
    Operating System: Windows


    ### What parser are you using?

    Default (Espree)

    ### What did you do?

    <details>
    <summary>Configuration</summary>

    ```js
    {
        "rules": {
            "use-isnan": ["error", {
                "enforceForIndexOf": true
            }]
        }
    }
    ```
    </details>

    ```js
    // 1. Shadowing NaN in a local scope
    let NaN = 5;
    if (x === NaN) {}

    // 2. Shadowing Number in a function parameter
    function f(Number) {
        return x === Number.NaN;
    }

    // 3. Shadowing NaN in a switch case
    function testSwitch(foo) {
        let NaN = 5;
        switch (foo) {
            case NaN: break;
        }
    }

    // 4. Shadowing NaN inside an Array.prototype.indexOf argument
    function foo(NaN) {
        return arr.indexOf(NaN);
    }
    ```


    ### What did you expect to happen?

    I expected no errors to be reported.

    In the provided cases, the NaN and Number identifiers are explicitly shadowed by local variables or function parameters. Because they no longer reference the built-in global NaN, comparing against them is perfectly valid JavaScript. The rule should use scope analysis to ensure it only flags references to the true global object.



    ### What actually happened?

    ESLint incorrectly reported false positives for all the shadowed bindings because it matched them by name only.

