    `flatten` does not rename conflicting column if parent's conflicting column appears after column to be flattened

    ### Describe the bug

    Nushell's `flatten` command has an undocumented feature that it automatically renames a column in format `{parent's}_{child's}` if name conflict happens. But as of 0.53.0, renaming *does not* happen if the parent's conflicting column appears after the column to be flattened:

    ```nu
    > [[a, b]; [1, [[a]; [9]]]] | flatten -a b  # Renaming happens
    ╭───┬───┬─────╮
    │ # │ a │ b_a │
    ├───┼───┼─────┤
    │ 0 │ 1 │   9 │
    ╰───┴───┴─────╯

    > [[b, a]; [[[a]; [9]], 1]] | flatten -a b  # Renaming does not happens
    ╭───┬───╮
    │ # │ a │
    ├───┼───┤
    │ 0 │ 9 │
    ╰───┴───╯
    ```

    I expect the renaming happens regardless of the order of column.

    ### How to reproduce

    1. Prepare a table which meets the conditions below:
       - It has a nested table.
       - The nested table must have a column with the same name as a column in the parent table.
       - The outer table's column with conflicting name appears **after** the column having the nested table.
    2. Apply `flatten` to the column containing the nested table.

    ### Expected behavior

    The column with conflicting name was renamed on flattening.

