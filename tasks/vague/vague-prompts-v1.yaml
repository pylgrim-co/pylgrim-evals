    Context.redirect doesn't accept a URL which contains multibyte characters

    ### What version of Hono are you using?

    4.8.5

    ### What runtime/platform is your app running on? (with version if possible)

    Node v20.19.2

    ### What steps can reproduce the bug?

    ```
    app.get("/", (c) => {
      return c.redirect("https://ja.wikipedia.org/wiki/小麦粉");
    });
    ```

    Here is the reproduction repo: https://github.com/yayugu/hono-bug-report/tree/2025-07-22-redirect

    ```bash
    $ pnpm i
    $ pnpm dev
    # Then access to http://localhost:3000
    ```


    ### What is the expected behavior?

    Just redirect to the page.

    ### What do you see instead?

    The error output:
    ```
    TypeError: Cannot convert argument to a ByteString because the character at index 30 has a value of 23567 which is greater than 255.
        at webidl.converters.ByteString (node:internal/deps/undici/undici:3889:17)
        at _Headers.set (node:internal/deps/undici/undici:8921:35)
        at Context.header (file:///home/yayugu/hono-bug-report/node_modules/.pnpm/hono@4.8.5/node_modules/hono/dist/context.js:100:15)
        at Context.redirect (file:///home/yayugu/hono-bug-report/node_modules/.pnpm/hono@4.8.5/node_modules/hono/dist/context.js:167:10)
        at Array.<anonymous> (/home/yayugu/hono-bug-report/src/index.tsx:7:12)
        at #dispatch (file:///home/yayugu/hono-bug-report/node_modules/.pnpm/hono@4.8.5/node_modules/hono/dist/hono-base.js:188:38)
        at fetch (file:///home/yayugu/hono-bug-report/node_modules/.pnpm/hono@4.8.5/node_modules/hono/dist/hono-base.js:214:26)
        at Server.<anonymous> (file:///home/yayugu/hono-bug-report/node_modules/.pnpm/@hono+node-server@1.17.1_hono@4.8.5/node_modules/@hono/node-server/dist/index.mjs:487:13)
        at Server.emit (node:events:524:28)
        at parserOnIncoming (node:_http_server:1141:12)
    ```

    ### Additional information

    #### Necessity
    I found this during implementing the dynamic redirect, for example:

    ```javascript
    const paramA = c.req.param("paramA");
    c.redirect(`/new-url/${paramA}`);
    ```

    Type check didn't help and found the bug after released the code. It's easy to wrap with encodeURI(), by it would super nice if redirect() function cares the encoding.

    #### Cause and Design of the Fix
    Node's Header object doesn't accept multibyte characters https://github.com/nodejs/node/issues/42579.

    Context.redirect() is currently just by pass the value. It should accept any valid URL and encode that if necessary.
    The complicated thing is if the path / URI is already encoded, it must not re-encode that. The pseudo code would be

    ```javascript
    if (path.hasNonASCII() {
      path = encodeURI(path);
    }
    header.set(path);
    ```

