hugo-t05:
  issue_url: "https://github.com/gohugoio/hugo/issues/14550"
  fetched: "2026-07-15"
  sha256: "16c1e802c08ce6d90cd38f852c54643e30cf6f4c2655db464f0a254223d3b8fe"
  prompt: |-
    `.Ancestors` hangs indefinitely when `disableKinds = []` is set alongside taxonomies

    <!--
    Please do not use the issue queue for questions or troubleshooting. Unless you are certain that your issue is a software defect, use the forum:

    https://discourse.gohugo.io
    -->

    <!-- Please answer these questions before submitting your issue. Thanks! -->

    ### What version of Hugo are you using (`hugo version`)?

    <pre>
    hugo v0.156.0-9d914726dee87b0e8e3d7890d660221bde372eec linux/amd64
    BuildDate=2026-02-18T16:39:55Z VendorInfo=gohugoio
    GOOS="linux"
    GOARCH="amd64"
    GOVERSION="go1.25.4"

    Linux 6.12.73+deb13-amd64 (Debian Trixie) x86_64
    RAM: 32 GB (24 GB available at test time)
    </pre>

    ### Does this issue reproduce with the latest release?

    Yes v0.156.0 and v0.155.3.


    ## Description

    Calling `.Ancestors` in any template causes Hugo to hang indefinitely and consume all available memory when `disableKinds = []` is present in `hugo.toml`. The process is eventually killed by the OOM killer (exit 137) or by a timeout (exit 124).

    This happens even with a **single content page** and a **single taxonomy**.

    `disableKinds = []` is semantically a no-op (empty list = disable nothing), so it should have no effect on behavior. Without this line, the exact same site builds in ~17 ms.

    ## Steps to reproduce

    ### 1. Create the minimal site (4 files)

    ```
    hugo-bug/
      hugo.toml
      content/posts/hello.md
      themes/test/layouts/_default/single.html
      themes/test/layouts/_default/list.html
    ```

    **hugo.toml**
    ```toml
    baseURL = 'http://example.com/'
    title = 'Bug repro'
    theme = "test"

    [taxonomies]
      tag = "tags"

    disableKinds = []
    ```

    **content/posts/hello.md**
    ```markdown
    ---
    title: Hello
    tags: [demo]
    ---
    Hello.
    ```

    **themes/test/layouts/_default/single.html**
    ```
    {{ .Ancestors }}
    ```

    **themes/test/layouts/_default/list.html**
    ```
    {{ .Title }}
    ```

    ### 2. Build

    ```sh
    hugo --source hugo-bug
    ```

    ### Expected behavior

    Build completes successfully (10 pages, ~17 ms).

    ### Actual behavior

    Hugo hangs at "Start building sites…". Debug log shows memory growing uncontrollably before the process is killed:

    ```
    INFO  build:  step process duration 1.096148ms
    INFO  build:  step assemble duration 780.626µs
    INFO  dynacache: adjusted partitions' max size evicted 305 numGC 35 limit 7.77 GB alloc 17.39 GB totalAlloc 43.44 GB
    ```

    The process allocates 17+ GB (`alloc`) with 43+ GB total allocated (`totalAlloc`), indicating a tight allocation loop. It is then killed by the OOM killer (SIGKILL, exit 137).

    ### 3. Remove `disableKinds = []` and rebuild

    ```sh
    # Remove the disableKinds line, then:
    hugo --source hugo-bug
    # → Total in 17 ms, exit 0
    ```

    ## Workarounds

    1. **Remove `disableKinds = []`** from config — it is a no-op and should not be present.

    2. **Replace `.Ancestors`** with a manual `.Parent` chain that avoids the recursive resolution:

    ```html
    {{- $current := . -}}
    {{- $crumbs := slice -}}
    {{- range seq 10 -}}
      {{- if $current.Parent -}}
        {{- $current = $current.Parent -}}
        {{- $crumbs = $crumbs | append $current -}}
      {{- end -}}
    {{- end -}}
    {{- if gt (len $crumbs) 0 }}
    <nav>
      <ol>
        {{- range ($crumbs | collections.Reverse) }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
        {{- end }}
        <li>{{ .Title }}</li>
      </ol>
    </nav>
    {{- end }}
    ```

