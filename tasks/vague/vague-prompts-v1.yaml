zustand-t02:
  issue_url: "https://github.com/pmndrs/zustand/discussions/3266"
  fetched: "2026-07-15"
  sha256: "3ce90aedd80db466ccf967f0a456a8c4563afe4916432369a495f54d83a48572"
  prompt: |-
    Node 25 - Zustand persist blows up in node 25

    ### Bug Description

    # Zustand persist breaks with Node 25’s new web storage stub

    ## Summary
    Running stores wrapped in `persist` now explodes with:

    ```ts
    TypeError: storage.setItem is not a function
    ```

    under Node.js 25 whenever the process receives `--localstorage-file` without a valid path.

    Node 25 auto-initializes a bare `{}` at `globalThis.localStorage` in that configuration; the persist middleware trusts `localStorage` blindly and calls `setItem` → immediate crash.

    ## Environment
    - Node.js 25.0.0 (Windows 11 x64 tested, but this is runtime-level and OS-agnostic)
    - Zustand 5.0.8 (`zustand/middleware` → `persist`)
    - Reproduced in Vitest 3.2.4 and by running the snippet directly with `node`

    ## Minimal Repro
    1. Ensure `NODE_OPTIONS` contains `--localstorage-file` without a path (VS Code’s JS debug bootloader does this automatically, but you can set it yourself).
    2. Create `repro.mjs`:

    ```ts
    import { createStore } from "zustand/vanilla";
    import { persist } from "zustand/middleware";

    const useStore = createStore(
      persist(
        () => ({ count: 0 }),
        { name: "counter" }
      )
    );

    console.log(useStore.getState().count);
    ```

    3. Run with Node 25:

    ```pwsh
    $env:NODE_OPTIONS='--localstorage-file'
    node repro.mjs
    ```

    4. Observe crash:

    ```text
    TypeError: storage.setItem is not a function
        at setItem (node_modules/zustand/esm/middleware.mjs:297:22)
        …
    ```

    ## Expected
    If `getStorage()` hands back something that doesn’t actually behave like Web Storage, `persist` should notice. It should either fall back to an in-memory store or throw a specific, helpful error. The one thing it must not do is blindly call `.setItem()` on a value whose methods haven’t been verified.

    ## Actual
    Under Node 25, `localStorage` resolves to a plain `{}`. `persist` skips validation, calls `.setItem`, and the store crashes immediately. Any persisted store-tests, scripts, production-dies the moment it initializes.

    ## Why It Matters
    The `--localstorage-file` flag is now common (VS Code’s debugger sets it automatically), so this configuration isn’t exotic. Without a fix, every Zustand project that upgrades to Node 25 hits a fatal error unless they add custom shims.

    ### Reproduction Link

    I put one in the bug report

