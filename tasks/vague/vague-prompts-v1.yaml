    --parser babel
    ```

    **Input:**
    <!-- prettier-ignore -->
    ```jsx
    export default moment.defineLocale("bo", {
      monthsShort:
        "ཟླ་1_ཟླ་2_ཟླ་3_ཟླ་4_ཟླ་5_ཟླ་6_ཟླ་7_ཟླ་8_ཟླ་9_ཟླ་10_ཟླ་11_ཟླ་12".split("_"),
    });
    ```

    **Output:**
    <!-- prettier-ignore -->
    ```jsx
    export default moment.defineLocale("bo", {
      monthsShort:
        "ཟླ་1_ཟླ་2_ཟླ་3_ཟླ་4_ཟླ་5_ཟླ་6_ཟླ་7_ཟླ་8_ཟླ་9_ཟླ་10_ཟླ་11_ཟླ་12".split("_"),
    });

    ```

    **Expected output:**
    <!-- prettier-ignore -->
    ```jsx
    export default moment.defineLocale("bo", {
      monthsShort: "ཟླ་1_ཟླ་2_ཟླ་3_ཟླ་4_ཟླ་5_ཟླ་6_ཟླ་7_ཟླ་8_ཟླ་9_ཟླ་10_ཟླ་11_ཟླ་12".split("_"),
    });
    ```

    **Why?**

    `getStringWidth` currently treats only combining marks in `U+0300..U+036F` as zero-width, so nonspacing marks from other scripts, such as Tibetan `U+0FB3` in `ཟླ,` are counted as visible columns. This can cause Prettier to break lines even when the rendered text fits within printWidth.

    (Note, [Oxc has the desired behavior](https://github.com/oxc-project/oxc/issues/23863#issuecomment-4881454798))

