contamination_note: "Issue opened 2025-09-30 (before the Jan 2026 cutoff, so the bug report may be in training data) but the fix merged 2026-04-29, well after the cutoff, so the ground-truth patch is not. Fail-at-base VERIFIED on the eval host in a scratch worktree at the base SHA: the PR's key-transform assertions fail (literal transform returns { a: 'John' }) while the partialRecord parity baseline passes, and the scoped test file is green at base (44 passed)."
